<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Dashscore</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topbar">

<div class="logo">

<img src="images/logo.png" class="logo-icon">

DASHSCORE

</div>

<div class="search">

<img src="images/search.png" class="search-icon">

<input type="text" placeholder="Pesquise por Transferências, Jogadores, Times e mais">

</div>

<div class="menu-icons">

<img src="images/shield.png" class="icon">

<button class="login">ENTRAR</button>

<span class="star">⭐</span>
<span class="gear">⚙️</span>

</div>

</header>

<main class="container">

<div class="card big-left">

<h2>Últimas Transferências</h2>

<div class="transfer">

<img src="images/player.png">

<div>
<p><strong>Neymar</strong></p>
<p>PSG → Al-Hilal</p>
</div>

</div>

<div class="transfer">

<img src="images/player.png">

<div>
<p><strong>Messi</strong></p>
<p>PSG → Inter Miami</p>
</div>

</div>

</div>

<div class="middle">

    <div class="card small">

<h3>Jogadores em Destaque</h3>

<p>Mbappé</p>
<p>Haaland</p>
<p>Vinícius Jr</p>

</div>
<div class="card small">

<h3>Notícias</h3>

<p>Real Madrid busca reforços</p>
<p>Barcelona negocia jovem promessa</p>

</div>
<div class="card big-right">

<h2>Clubes</h2>

<p>Real Madrid</p>
<p>Barcelona</p>
<p>Manchester City</p>

</div>
<div class="card small"></div>

<div class="card small"></div>

</div>

<div class="card big-right"></div>

</main>

<footer>

<p>Dashscore © 2026</p>

</footer>

</body>
</html>
